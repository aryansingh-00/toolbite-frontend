<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-900 text-white font-mono p-8">
    <header class="flex justify-between items-start mb-24">
        <div>
            <h1 class="text-4xl font-bold tracking-tight mb-2">ALEX.DEV</h1>
            <p class="text-zinc-400">Creative Technologist / WebGL Expert</p>
        </div>
        <div class="text-right text-sm text-zinc-500">
            <p>AVAILABLE FOR WORK</p>
            <p class="text-zinc-300">HELLO@ALEX.DEV</p>
        </div>
    </header>
    <main>
        <h2 class="text-xl mb-6 text-zinc-400">SELECTED WORKS (2024)</h2>
        <div class="grid grid-cols-2 gap-8">
            <div class="group cursor-pointer">
                <div class="w-full aspect-video bg-zinc-800 mb-4 overflow-hidden relative">
                    <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=800&q=80" alt="Retro Tech" class="w-full h-full object-cover group-hover:scale-105 transition duration-500 opacity-60 group-hover:opacity-100" />
                </div>
                <div class="flex justify-between items-center">
                    <h3 class="text-lg">01. Neon Protocol</h3>
                    <span class="text-zinc-500 text-sm">WebGL / React</span>
                </div>
            </div>
            <div class="group cursor-pointer mt-12">
                <div class="w-full aspect-video bg-zinc-800 mb-4 overflow-hidden relative">
                    <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=800&q=80" alt="Abstract Art" class="w-full h-full object-cover group-hover:scale-105 transition duration-500 opacity-60 group-hover:opacity-100" />
                </div>
                <div class="flex justify-between items-center">
                    <h3 class="text-lg">02. Spatial Audio</h3>
                    <span class="text-zinc-500 text-sm">Three.js / WebAudio</span>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
