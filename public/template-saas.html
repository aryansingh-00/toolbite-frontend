<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6 font-sans">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8 bg-white p-4 rounded-xl shadow-sm">
            <h1 class="text-2xl font-bold text-indigo-600">NexusAnalytics</h1>
            <div class="flex gap-4">
                <div class="h-10 w-10 bg-indigo-100 rounded-full"></div>
            </div>
        </header>
        <div class="grid grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                <h3 class="text-sm text-slate-500 mb-2">Total Revenue</h3>
                <p class="text-3xl font-bold text-slate-800">$124,500</p>
                <span class="text-green-500 text-sm mt-2 block">+14.5% this month</span>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                <h3 class="text-sm text-slate-500 mb-2">Active Users</h3>
                <p class="text-3xl font-bold text-slate-800">45.2K</p>
                <span class="text-green-500 text-sm mt-2 block">+5.2% this month</span>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                <h3 class="text-sm text-slate-500 mb-2">Churn Rate</h3>
                <p class="text-3xl font-bold text-slate-800">1.2%</p>
                <span class="text-red-500 text-sm mt-2 block">-0.4% this month</span>
            </div>
        </div>
        <div class="bg-white h-64 rounded-xl shadow-sm border border-slate-100 p-6">
            <h3 class="text-lg font-semibold text-slate-800 mb-4">Growth Overview</h3>
            <div class="h-40 w-full bg-slate-50 rounded border border-dashed border-slate-200 flex items-center justify-center">
                <span class="text-slate-400">[Chart Widget]</span>
            </div>
        </div>
    </div>
</body>
</html>
