<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 295 80" fill="none">

  <!-- Outer C-shape hexagon (open on right side) -->
  <path
    class="line"
    d="M 57,10 L 23,10 L 6,39 L 23,68 L 57,68"
    stroke="#0f172a"
    stroke-width="4.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Inner C-shape hexagon (double-line effect) -->
  <path
    class="line"
    d="M 52,19 L 27,19 L 15,39 L 27,59 L 52,59"
    stroke="#0f172a"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Right-pointing solid triangle -->
  <polygon points="22,26 22,52 56,39" fill="#0f172a" />

  <!-- "TOOL" in dark slate -->
  <text
    x="80"
    y="53"
    font-family="'Arial Black', 'Impact', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="34"
    fill="#0f172a"
    letter-spacing="1"
  >TOOL</text>

  <!-- "BITE" in teal -->
  <text
    x="180"
    y="53"
    font-family="'Arial Black', 'Impact', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="34"
    fill="#14b8a6"
    letter-spacing="1"
  >BITE</text>

</svg>
