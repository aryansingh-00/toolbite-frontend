<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white font-serif">
    <nav class="border-b py-6 px-12 flex justify-between items-center">
        <h1 class="text-3xl font-bold tracking-tighter">LUMIÈRE</h1>
        <div class="flex gap-8 text-sm uppercase tracking-widest text-gray-500">
            <span>Shop</span>
            <span>Collections</span>
            <span>About</span>
            <span>Cart (2)</span>
        </div>
    </nav>
    <main class="px-12 py-12 grid grid-cols-2 gap-12 items-center">
        <div>
            <h2 class="text-6xl font-medium leading-tight mb-6">The Summer <br/> Essentials.</h2>
            <p class="text-gray-500 mb-8 max-w-md text-lg">Discover our latest collection of premium materials and timeless designs for the modern wardrobe.</p>
            <button class="bg-black text-white px-8 py-4 uppercase tracking-widest text-sm hover:bg-gray-800 transition">Shop Collection</button>
        </div>
        <div class="aspect-[4/5] bg-gray-100 object-cover flex items-center justify-center relative overflow-hidden">
            <img src="https://images.unsplash.com/photo-1434389670869-c49f430c5b43?auto=format&fit=crop&w=800&q=80" alt="Fashion" class="w-full h-full object-cover" />
        </div>
    </main>
</body>
</html>
